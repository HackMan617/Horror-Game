<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 440" width="1280" height="440" font-family="'Courier New', monospace">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#05060d"/>
      <stop offset="45%" stop-color="#0b1020"/>
      <stop offset="78%" stop-color="#151a2e"/>
      <stop offset="100%" stop-color="#1c2036"/>
    </linearGradient>
    <radialGradient id="moonGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#cdd6e8" stop-opacity="0.9"/>
      <stop offset="35%" stop-color="#8b93b0" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#8b93b0" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="win" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#ffcf7a"/>
      <stop offset="60%" stop-color="#e8892e"/>
      <stop offset="100%" stop-color="#8a3d10"/>
    </radialGradient>
    <linearGradient id="fog" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#39415e" stop-opacity="0"/>
      <stop offset="100%" stop-color="#39415e" stop-opacity="0.55"/>
    </linearGradient>
    <radialGradient id="vig" cx="50%" cy="42%" r="72%">
      <stop offset="55%" stop-color="#000000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.72"/>
    </radialGradient>
    <linearGradient id="title" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f4f6ff"/>
      <stop offset="100%" stop-color="#aeb6d6"/>
    </linearGradient>
    <filter id="soft" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="7"/>
    </filter>
    <filter id="haze" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="10"/>
    </filter>
  </defs>

  <!-- sky -->
  <rect width="1280" height="440" fill="url(#sky)"/>

  <!-- stars -->
  <g fill="#c7cee6">
    <rect x="120" y="48" width="2" height="2" opacity="0.8"/>
    <rect x="240" y="90" width="2" height="2" opacity="0.5"/>
    <rect x="360" y="40" width="2" height="2" opacity="0.7"/>
    <rect x="520" y="70" width="2" height="2" opacity="0.6"/>
    <rect x="705" y="52" width="2" height="2" opacity="0.9"/>
    <rect x="880" y="96" width="2" height="2" opacity="0.5"/>
    <rect x="980" y="44" width="2" height="2" opacity="0.7"/>
    <rect x="1090" y="82" width="2" height="2" opacity="0.6"/>
    <rect x="1180" y="58" width="2" height="2" opacity="0.8"/>
    <rect x="60" y="120" width="2" height="2" opacity="0.4"/>
    <rect x="430" y="120" width="2" height="2" opacity="0.5"/>
    <rect x="1220" y="120" width="2" height="2" opacity="0.5"/>
  </g>

  <!-- moon -->
  <circle cx="1050" cy="120" r="150" fill="url(#moonGlow)"/>
  <circle cx="1050" cy="120" r="46" fill="#dfe5f2"/>
  <circle cx="1068" cy="108" r="9" fill="#c4ccdd" opacity="0.7"/>
  <circle cx="1036" cy="132" r="6" fill="#c4ccdd" opacity="0.6"/>
  <circle cx="1058" cy="138" r="4" fill="#c4ccdd" opacity="0.5"/>

  <!-- distant mountain ridge -->
  <path d="M0 300 L150 250 L300 295 L470 235 L640 300 L820 245 L1010 300 L1180 255 L1280 290 L1280 440 L0 440 Z" fill="#141a2e" opacity="0.85"/>

  <!-- back fog band -->
  <rect x="0" y="270" width="1280" height="120" fill="url(#fog)" filter="url(#haze)" opacity="0.7"/>

  <!-- cabin silhouette with lit windows -->
  <g transform="translate(196 250)">
    <!-- body -->
    <rect x="0" y="40" width="150" height="86" fill="#0a0c15"/>
    <!-- roof -->
    <path d="M-16 44 L75 -2 L166 44 Z" fill="#0a0c15"/>
    <!-- chimney -->
    <rect x="118" y="8" width="16" height="30" fill="#0a0c15"/>
    <!-- windows -->
    <rect x="22" y="64" width="26" height="26" fill="url(#win)"/>
    <rect x="102" y="64" width="26" height="26" fill="url(#win)"/>
    <!-- door -->
    <rect x="62" y="82" width="26" height="44" fill="#1c1206"/>
    <rect x="66" y="86" width="18" height="26" fill="url(#win)" opacity="0.55"/>
  </g>

  <!-- pine treeline (foreground) -->
  <g fill="#04060c">
    <g transform="translate(0 210)">
      <path d="M40 230 L18 230 L30 150 L4 152 L34 96 L14 98 L44 44 L74 98 L54 96 L84 152 L58 150 L70 230 Z"/>
    </g>
    <g transform="translate(500 235)">
      <path d="M40 205 L18 205 L30 135 L4 137 L34 86 L14 88 L44 40 L74 88 L54 86 L84 137 L58 135 L70 205 Z"/>
    </g>
    <g transform="translate(1140 205)">
      <path d="M40 235 L18 235 L30 150 L4 152 L34 96 L14 98 L44 44 L74 98 L54 96 L84 152 L58 150 L70 235 Z"/>
    </g>
    <g transform="translate(1195 230)">
      <path d="M40 210 L20 210 L31 150 L8 152 L36 104 L16 106 L44 60 L72 106 L52 104 L80 152 L57 150 L68 210 Z" opacity="0.9"/>
    </g>
    <rect x="0" y="410" width="1280" height="30"/>
  </g>

  <!-- foreground fog -->
  <rect x="0" y="330" width="1280" height="110" fill="url(#fog)" filter="url(#soft)"/>

  <!-- title block -->
  <g text-anchor="middle">
    <text x="640" y="196" font-size="74" font-weight="bold" letter-spacing="12" fill="url(#title)" style="paint-order:stroke;stroke:#05060d;stroke-width:9">HORROR GAME</text>
    <text x="640" y="196" font-size="74" font-weight="bold" letter-spacing="12" fill="url(#title)">HORROR GAME</text>
    <text x="640" y="238" font-size="21" letter-spacing="7" fill="#e05b5b" style="paint-order:stroke;stroke:#05060d;stroke-width:5">a quiet cabin &#183; a rising dread</text>
    <text x="640" y="238" font-size="21" letter-spacing="7" fill="#e05b5b">a quiet cabin &#183; a rising dread</text>
  </g>

  <!-- dread meter motif -->
  <g transform="translate(508 262)">
    <rect x="0" y="0" width="264" height="9" rx="4.5" fill="#0a0c15" stroke="#2a3150" stroke-width="1"/>
    <rect x="2" y="2" width="150" height="5" rx="2.5" fill="#e05b5b"/>
    <rect x="152" y="2" width="60" height="5" rx="2.5" fill="#8a3d3d" opacity="0.6"/>
    <text x="132" y="30" text-anchor="middle" font-size="10" letter-spacing="5" fill="#8b93b0">D R E A D</text>
  </g>

  <!-- vignette -->
  <rect width="1280" height="440" fill="url(#vig)"/>
</svg>
